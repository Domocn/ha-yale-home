enable_delivery_mode:
  name: Enable access PIN
  description: Wakes the lock and enables the access PIN so a courier or guest can open it. (a.k.a. delivery mode / guest access)

disable_delivery_mode:
  name: Disable access PIN
  description: Disables the access PIN to secure the lock.

create_temp_pin:
  name: Create temporary PIN
  description: Create a time-limited PIN for a one-off delivery or a guest stay. The code auto-expires at the end time.
  fields:
    pin:
      name: PIN code
      description: 4-8 digit code. Leave blank to generate a random one.
      required: false
      example: "1234"
      selector:
        text: {}
    name:
      name: Guest / label name
      description: Optional label (e.g. a guest's name). Used to tag the code; Yale does not let us set guest names via the API, so this is a local hint only.
      required: false
      example: "John"
      selector:
        text: {}
    user_id:
      name: User ID
      description: Optional existing Yale user ID to tie the code to. Leave blank to create a standalone guest code (recommended for door/Airbnb use).
      required: false
      selector:
        text: {}
    start_time:
      name: Start time
      description: When the code becomes valid. iCal compact UTC, e.g. 20260711T110000Z. Optional — if omitted the code is valid immediately.
      required: false
      example: "20260711T110000Z"
      selector:
        text: {}
    end_time:
      name: End time (expiry)
      description: When the code expires (checkout). iCal compact UTC, e.g. 20260713T110000Z. The code stops opening the lock after this time.
      required: false
      example: "20260713T110000Z"
      selector:
        text: {}

rotate_pin:
  name: Rotate PIN
  description: Replace a code with a new value (random if none given). Also available by editing a code's text entity.
  fields:
    user_id:
      name: User ID
      description: The user whose code to rotate.
      required: false
      selector:
        text: {}
    new_pin:
      name: New PIN
      description: New 4-8 digit code. Leave blank to generate a random one.
      required: false
      example: "5678"
      selector:
        text: {}

delete_pin:
  name: Delete PIN
  description: Remove a code from the lock.
  fields:
    pin:
      name: PIN code
      required: true
      example: "1234"
      selector:
        text: {}
    user_id:
      name: User ID
      required: false
      selector:
        text: {}

create_named_guest:
  name: Create named guest
  description: Create a named guest with their own entry code (the same as adding a guest in the Yale Home app). Works because this integration logs in as the lock owner.
  fields:
    first_name:
      name: First name
      required: true
      example: "John"
      selector:
        text: {}
    last_name:
      name: Last name
      required: false
      example: "Smith"
      selector:
        text: {}
    pin:
      name: PIN code
      description: 4-8 digit code. Leave blank to generate a random one.
      required: false
      example: "4821"
      selector:
        text: {}
    access_type:
      name: Access type
      description: 'Use "always" for a permanent code, "temporary" to expire at the end time.'
      required: false
      example: "temporary"
      selector:
        select:
          options:
            - label: Permanent (always)
              value: always
            - label: Temporary (expires at end time)
              value: temporary
    start_time:
      name: Start time
      description: iCal compact UTC, e.g. 20260711T110000Z. Only used for temporary codes.
      required: false
      example: "20260711T110000Z"
      selector:
        text: {}
    end_time:
      name: End time (expiry)
      description: iCal compact UTC, e.g. 20260713T110000Z. Only used for temporary codes.
      required: false
      example: "20260713T110000Z"
      selector:
        text: {}
    other_user_id:
      name: Guest user ID
      description: Optional existing Yale guest user ID. Leave blank to create a new guest.
      required: false
      selector:
        text: {}

list_guests:
  name: List guests
  description: Fetches the house guest list and fires a yale_home_guestlist event with the result (and logs it).

remove_guest:
  name: Remove guest
  description: Remove a guest's access from the lock.
  fields:
    other_user_id:
      name: Guest user ID
      required: true
      selector:
        text: {}